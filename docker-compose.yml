services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8005
    volumes:
      - ./backend:/app
    ports:
      - "8005:8005"
    depends_on:
      - db
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb

  celery_worker:
    build: ./backend
    command: celery -A core worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  celery_beat:
    build: ./backend
    command: celery -A core beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://appuser:apppassword@db:5432/appdb
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0

  frontend:
    build: ./frontend
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    env_file:
      - path: ./frontend/.env
        required: false
    environment:
      VITE_API_BASE_URL: http://localhost:8005

volumes:
  postgres_data:
